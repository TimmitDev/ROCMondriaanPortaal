<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com;
  script-src 'self' https://cdn.tailwindcss.com 'unsafe-inline';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' data: https://fonts.gstatic.com;
  img-src 'self' data: blob: https:;
  media-src 'self' data: blob: https:;
  frame-src https://www.youtube.com https://www.youtube-nocookie.com;
  connect-src 'self';
  base-uri 'self';
  form-action 'self';
  object-src 'none';
  navigate-to 'self' https://www.youtube.com https://www.youtube-nocookie.com;
">
  <title>Support - Kennisbank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "ui-sans-serif", "sans-serif"],
            display: ["Sora", "ui-sans-serif", "sans-serif"]
          },
          colors: {
            brand: {
              50: "#fff3f2",
              100: "#ffe2df",
              200: "#ffc9c3",
              300: "#ffa49a",
              400: "#ff6f62",
              500: "#f3483a",
              600: "#dd3023",
              700: "#b9241b",
              800: "#991f19",
              900: "#7f201b"
            }
          },
          boxShadow: {
            soft: "0 20px 45px -25px rgba(15, 23, 42, 0.35)"
          },
          keyframes: {
            rise: {
              "0%": { opacity: "0", transform: "translateY(10px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            }
          },
          animation: {
            rise: "rise .35s ease-out both"
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: "Manrope", ui-sans-serif, sans-serif;
      background: radial-gradient(circle at 20% 10%, #fee2e2 0%, rgba(254, 226, 226, 0) 45%),
                  radial-gradient(circle at 85% 15%, #dbeafe 0%, rgba(219, 234, 254, 0) 45%),
                  linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
    }
    h1, h2, h3, .kb-display { font-family: "Sora", ui-sans-serif, sans-serif; }
    #sidebar {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 45px -25px rgba(15, 23, 42, 0.45);
    }
    #view > * { animation: rise .35s ease-out both; }
    [data-nav], [data-go], [data-topic], [data-back], [data-contact], #contactBtn {
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background-color .18s ease;
    }
    [data-go]:hover, [data-topic]:hover { transform: translateY(-2px); }
    [data-nav]:hover { transform: translateX(2px); }
    [data-topic]:focus-visible, [data-go]:focus-visible, [data-nav]:focus-visible {
      outline: 2px solid #f3483a;
      outline-offset: 2px;
    }
    #nav::-webkit-scrollbar { width: 8px; }
    #nav::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }

    #idleScreensaver {
      position: fixed;
      inset: 0;
      z-index: 10020;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .45s ease;
      background:
        radial-gradient(circle at 20% 20%, rgba(15, 23, 42, 0.65), transparent 42%),
        radial-gradient(circle at 80% 78%, rgba(30, 64, 175, 0.3), transparent 46%),
        linear-gradient(155deg, #020617 0%, #0f172a 50%, #111827 100%);
    }
    #idleScreensaver.is-active {
      opacity: 1;
      pointer-events: auto;
    }
    #idleScreensaver::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.17;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(148, 163, 184, 0.16) 0px,
          rgba(148, 163, 184, 0.16) 1px,
          transparent 1px,
          transparent 26px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(148, 163, 184, 0.14) 0px,
          rgba(148, 163, 184, 0.14) 1px,
          transparent 1px,
          transparent 26px
        );
      pointer-events: none;
    }
    #idleScreensaverLogo {
      position: absolute;
      top: 0;
      left: 0;
      width: clamp(140px, 20vw, 250px);
      aspect-ratio: 16 / 10;
      padding: .42rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.36);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(226, 232, 240, 0.46));
      box-shadow: 0 26px 52px -24px rgba(2, 6, 23, 0.95);
      will-change: transform;
      z-index: 1;
    }
    #idleScreensaverLogo img {
      width: 100%;
      height: 100%;
      border-radius: .72rem;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    #idleScreensaverLogo.is-bounce-flash {
      animation: idleBounceFlash .24s ease-out;
    }
    #idleScreensaverMessage {
      position: absolute;
      left: 50%;
      bottom: clamp(18px, 3vh, 30px);
      transform: translateX(-50%);
      z-index: 2;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.58);
      color: #f8fafc;
      padding: .72rem 1.2rem;
      font-size: clamp(1rem, 1.8vw, 1.35rem);
      font-weight: 800;
      letter-spacing: .02em;
      text-align: center;
      text-shadow: 0 2px 8px rgba(2, 6, 23, 0.65);
      backdrop-filter: blur(6px);
      transition: color .2s ease, border-color .2s ease, background-color .2s ease;
    }
    #idleScreensaverMessage.is-corner-hit {
      color: #fef9c3;
      border-color: rgba(253, 224, 71, 0.74);
      background: rgba(146, 64, 14, 0.36);
    }
    @keyframes idleBounceFlash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.32); }
      100% { filter: brightness(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      #idleScreensaver,
      #idleScreensaverLogo {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body class="text-slate-900 antialiased">
  <div id="topShield" class="fixed top-0 left-0 right-0 h-10 z-[9999] bg-transparent"></div>
  <div id="idleScreensaver" aria-hidden="true">
    <div id="idleScreensaverLogo">
      <img src="./ROCM.jpeg" alt="ROC Mondriaan logo">
    </div>
    <div id="idleScreensaverMessage">Beweeg de muis om de site te openen</div>
  </div>
  <div class="min-h-screen flex lg:gap-6 lg:px-4 lg:py-4">

    <!-- Mobile overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/40 hidden z-40 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
      class="fixed z-50 inset-y-0 left-0 w-80 border-r border-slate-200/70
             transform -translate-x-full transition-transform duration-200 ease-out
             lg:translate-x-0 lg:sticky lg:top-4 lg:h-[calc(100vh-2rem)] lg:rounded-3xl lg:border lg:border-slate-200/70"
    >
      <div class="h-full flex flex-col">

        <!-- Header / Logo -->
        <div class="px-4 py-4 border-b border-slate-200/70 flex items-center gap-3">
          <div class="h-11 w-11 rounded-2xl bg-white border border-slate-200 overflow-hidden shadow-sm">
            <img src="./ROCM.jpeg" alt="Logo" class="h-full w-full object-cover">
          </div>
          <div class="min-w-0">
            <div class="kb-display font-semibold text-slate-900 leading-tight">ROC Mondriaan ICT Portaal</div>
            <div id="liveMeta" class="text-xs text-slate-500 truncate">Laden...</div>
          </div>

          <button id="closeSidebar"
            class="ml-auto lg:hidden inline-flex items-center justify-center rounded-xl p-2 hover:bg-slate-100"
            aria-label="Sluit sidebar"
          >
            <svg class="w-5 h-5 text-slate-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <!-- Nav -->
        <div class="flex-1 min-h-0 overflow-auto px-3 py-3">
          <nav id="nav" class="space-y-4"></nav>
        </div>

        <!-- Sticky bottom buttons -->
        <div class="sticky bottom-0 bg-white/85 backdrop-blur border-t border-slate-200/70 p-4">
          <button id="contactBtn"
            class="w-full inline-flex items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-soft hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-300"
            type="button"
          >
            Mijn vraag staat er niet tussen
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 pt-1 lg:pt-0">
      <header class="sticky top-0 z-30 bg-white/85 backdrop-blur border-b border-slate-200/70 lg:rounded-2xl">
        <div class="px-4 py-3 flex items-center gap-3">
          <button id="openSidebar"
            class="lg:hidden inline-flex items-center justify-center rounded-xl p-2 hover:bg-slate-100"
            aria-label="Open sidebar"
          >
            <svg class="w-6 h-6 text-slate-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>

          <div class="min-w-0 flex-1">
            <div class="kb-display font-semibold text-slate-900">Kennisbank</div>
            <div id="breadcrumb" class="text-sm text-slate-600 truncate">Kies een categorie</div>
          </div>
        </div>
      </header>

      <div class="p-4 sm:p-6">
        <div class="max-w-6xl" id="view"></div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 hidden max-w-sm rounded-2xl bg-slate-900 text-white px-4 py-3 shadow-soft">
    <div id="toastText" class="text-sm"></div>
  </div>

<script>
  // Extra blokkades voor contextmenu/selection/copy
  document.addEventListener("contextmenu", (e) => e.preventDefault());
  document.addEventListener("selectstart", (e) => e.preventDefault());
  document.addEventListener("dragstart", (e) => e.preventDefault());
  document.addEventListener("copy", (e) => e.preventDefault());
  document.addEventListener("cut", (e) => e.preventDefault());
  document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();
    const ctrlOrCmd = e.ctrlKey || e.metaKey;
    const isDevtoolsShortcut =
      key === "f12" ||
      (ctrlOrCmd && e.shiftKey && (key === "i" || key === "j" || key === "c")) ||
      (ctrlOrCmd && (key === "u" || key === "s" || key === "p" || key === "a" || key === "c" || key === "x"));
    if (isDevtoolsShortcut) e.preventDefault();
  });


  // =====================================================
  // IndexedDB Media Store (same as admin)
  // =====================================================
  const MEDIA_DB = "kb_media_v1";
  const MEDIA_STORE = "files";

  function idbOpen() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(MEDIA_DB, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(MEDIA_STORE)) db.createObjectStore(MEDIA_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbGet(key) {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(MEDIA_STORE, "readonly");
      const req = tx.objectStore(MEDIA_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbList() {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const items = [];
      const tx = db.transaction(MEDIA_STORE, "readonly");
      const store = tx.objectStore(MEDIA_STORE);
      const req = store.openCursor();
      req.onsuccess = () => {
        const cur = req.result;
        if (!cur) return;
        items.push({ key: cur.key, record: cur.value });
        cur.continue();
      };
      tx.oncomplete = () => resolve(items);
      tx.onerror = () => reject(tx.error);
    });
  }

  // =====================================================
  // App
  // =====================================================
  const STORAGE_KEY = "kb_data_v1";
  const REMOTE_DATA_URL = "./kb-data.json";
  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel("kb_updates") : null;

  const navEl = document.getElementById("nav");
  const navSearchEl = document.getElementById("navSearch");
  const viewEl = document.getElementById("view");
  const breadcrumbEl = document.getElementById("breadcrumb");
  const liveMetaEl = document.getElementById("liveMeta");

  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const openSidebarBtn = document.getElementById("openSidebar");
  const closeSidebarBtn = document.getElementById("closeSidebar");
  const idleScreensaverEl = document.getElementById("idleScreensaver");
  const idleScreensaverLogoEl = document.getElementById("idleScreensaverLogo");
  const idleScreensaverMessageEl = document.getElementById("idleScreensaverMessage");
  const IDLE_TIMEOUT_MS = 90 * 1000;
  const IDLE_BASE_SPEED = 2.45;

  const toastEl = document.getElementById("toast");
  const toastTextEl = document.getElementById("toastText");
  let toastTimer = null;
  let idleTimer = null;
  let idleScreenVisible = false;
  let idleAnimFrame = null;
  let idleAnimPrevTs = null;
  let idlePosX = 0;
  let idlePosY = 0;
  let idleVelX = IDLE_BASE_SPEED;
  let idleVelY = IDLE_BASE_SPEED;
  let idleBouncerInitialized = false;
  let idleCornerFlashTimer = null;

  function showToast(msg) {
    toastTextEl.textContent = msg;
    toastEl.classList.remove("hidden");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.add("hidden"), 2200);
  }

  function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[s]));
  }

  const ISSUE_FEEDBACK_KEY = "kb_issue_feedback_v1";
  const ISSUE_REASONS = [
    { id: "unclear", label: "Antwoorden zijn onduidelijk" },
    { id: "missing", label: "Antwoord staat er niet tussen" },
    { id: "wrong", label: "Antwoord lost het probleem niet op" },
    { id: "video", label: "Video-uitleg helpt niet genoeg" },
    { id: "other", label: "Anders" }
  ];

  function loadIssueFeedbackStore() {
    const fallback = { counts: {}, last: null };
    const raw = localStorage.getItem(ISSUE_FEEDBACK_KEY);
    if (!raw) return fallback;
    try {
      const parsed = JSON.parse(raw);
      return {
        counts: (parsed && typeof parsed.counts === "object" && parsed.counts) ? parsed.counts : {},
        last: (parsed && parsed.last) ? parsed.last : null
      };
    } catch {
      return fallback;
    }
  }

  function saveIssueFeedbackStore(store) {
    localStorage.setItem(ISSUE_FEEDBACK_KEY, JSON.stringify(store));
  }

  function submitIssueFeedback(reasonId, label) {
    const store = loadIssueFeedbackStore();
    const next = Math.max(0, Number(store.counts?.[reasonId] || 0)) + 1;
    store.counts = store.counts || {};
    store.counts[reasonId] = next;
    store.last = {
      reasonId,
      label,
      at: new Date().toISOString()
    };
    saveIssueFeedbackStore(store);
    return store;
  }

  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    let data = { meta: { updatedAt: null }, categories: [] };
    let needsPersist = false;

    if (!raw) {
      needsPersist = true;
    } else {
      try {
        data = JSON.parse(raw);
      } catch {
        data = { meta: { updatedAt: null }, categories: [] };
        needsPersist = true;
      }
    }

    data.meta = data.meta || {};
    if (!Array.isArray(data.categories)) {
      data.categories = [];
      needsPersist = true;
    }

    if (needsPersist) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    return data;
  }

  function hasCategories(data) {
    return !!(data && Array.isArray(data.categories) && data.categories.length > 0);
  }

  function isValidDataShape(data) {
    return !!(data && typeof data === "object" && Array.isArray(data.categories));
  }

  function toEpochMs(value) {
    const ms = Date.parse(value || "");
    return Number.isFinite(ms) ? ms : null;
  }

  function shouldUseRemoteData(localData, remoteData) {
    if (!hasCategories(localData)) return true;

    const localUpdatedAtMs = toEpochMs(localData?.meta?.updatedAt);
    const remoteUpdatedAtMs = toEpochMs(remoteData?.meta?.updatedAt);

    if (remoteUpdatedAtMs !== null && (localUpdatedAtMs === null || remoteUpdatedAtMs > localUpdatedAtMs)) {
      return true;
    }

    if (remoteUpdatedAtMs !== null && localUpdatedAtMs !== null && remoteUpdatedAtMs === localUpdatedAtMs) {
      const localSnapshot = JSON.stringify(localData.categories || []);
      const remoteSnapshot = JSON.stringify(remoteData.categories || []);
      return localSnapshot !== remoteSnapshot;
    }

    return false;
  }

  async function syncDataFromRepoIfNeeded() {
    const localData = loadData();

    try {
      const remoteUrl = `${REMOTE_DATA_URL}${REMOTE_DATA_URL.includes("?") ? "&" : "?"}ts=${Date.now()}`;
      const res = await fetch(remoteUrl, { cache: "no-store" });
      if (!res.ok) return false;

      const remoteData = await res.json();
      if (!isValidDataShape(remoteData) || !hasCategories(remoteData)) return false;

      remoteData.meta = remoteData.meta || {};
      if (!shouldUseRemoteData(localData, remoteData)) return false;

      localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData));
      if (bc) bc.postMessage({ type: "updated", at: remoteData.meta.updatedAt || null });
      return true;
    } catch {
      return false;
    }
  }

  function getYouTubeId(url) {
    if (!url) return null;
    try {
      const u = new URL(url);
      if (u.hostname.includes("youtu.be")) return u.pathname.replace("/", "") || null;
      if (u.hostname.includes("youtube.com")) return u.searchParams.get("v");
    } catch {}
    return null;
  }

  let DATA = loadData();

  function setLiveMeta() {
    const at = DATA?.meta?.updatedAt;
    liveMetaEl.textContent = at
      ? `Laatst bijgewerkt: ${new Date(at).toLocaleString()}`
      : "Nog geen content";
  }

  // ObjectURL cleanup for IDB media
  let activeObjectUrls = [];
  function revokeActiveObjectUrls() {
    for (const u of activeObjectUrls) URL.revokeObjectURL(u);
    activeObjectUrls = [];
  }

  async function hydrateIdbMedia() {
    const nodes = viewEl.querySelectorAll("[data-idb-media]");
    for (const el of nodes) {
      const key = el.getAttribute("data-idb-media");
      const type = el.getAttribute("data-idb-type");
      if (!key || !type) continue;

      const rec = await idbGet(key);
      if (!rec || !rec.blob) continue;

      const url = URL.createObjectURL(rec.blob);
      activeObjectUrls.push(url);

      if (type === "image") el.src = url;
      if (type === "video") el.src = url;
      if (type === "audio") el.src = url;
    }
  }

  // #/catId/subId/topicId     => solution
  // #/feedback or #/contact   => feedback
  // #/audio or #/podcast      => audiopage
  function parseRoute() {
    const hash = (location.hash || "#/").replace(/^#/, "");
    const parts = hash.split("/").filter(Boolean);

    if (parts.length === 0) return { view: "home" };
    if (parts[0] === "feedback" || parts[0] === "contact") return { view: "feedback" };
    if (parts[0] === "audio" || parts[0] === "podcast") return { view: "audio" };

    const catId = parts[0];
    const subId = parts[1];
    const topicId = parts[2];

    if (catId && subId && topicId) return { view: "topic", catId, subId, topicId };
    if (catId && subId) return { view: "tiles", catId, subId };

    return { view: "home" };
  }
  function go(path) { location.hash = path; }
  function getActiveSidebarState() {
    const r = parseRoute();
    if (r.view === "tiles" || r.view === "topic") return { catId: r.catId, subId: r.subId };
    return null;
  }

  function findCategory(catId) { return DATA.categories.find(c => c.id === catId); }
  function findSub(catId, subId) {
    const c = findCategory(catId);
    if (!c) return null;
    return c.subcategories.find(s => s.id === subId);
  }
  function findTopic(catId, subId, topicId) {
    const s = findSub(catId, subId);
    if (!s) return null;
    return s.topics.find(t => t.id === topicId);
  }

  // Sidebar
  function renderSidebar(active) {
    const query = (navSearchEl?.value || "").trim().toLowerCase();
    const visibleCategories = DATA.categories
      .map(cat => {
        const subs = (cat.subcategories || []).filter(sub => {
          if (!query) return true;
          const subMatch = (sub.name || "").toLowerCase().includes(query);
          const topicMatch = (sub.topics || []).some(t =>
            (t.title || "").toLowerCase().includes(query) ||
            (t.summary || "").toLowerCase().includes(query)
          );
          return subMatch || topicMatch;
        });
        const catMatch = (cat.name || "").toLowerCase().includes(query);
        const showCategory = !query || catMatch || subs.length > 0;
        return { cat, subcategories: subs, showCategory };
      })
      .filter(item => item.showCategory);

    if (!visibleCategories.length) {
      const msg = query
        ? `Geen resultaten voor <span class="font-semibold">${escapeHtml(query)}</span>.`
        : "Nog geen categorieen beschikbaar.";
      navEl.innerHTML = `
        <div class="rounded-2xl border border-dashed border-slate-300 bg-white/70 p-4 text-sm text-slate-600">
          ${msg}
        </div>
      `;
      return;
    }

    navEl.innerHTML = visibleCategories.map(({ cat, subcategories }) => {
      const isActiveCat = active?.catId === cat.id;
      return `
        <section class="space-y-2">
          <div class="px-1">
            <div class="text-[11px] font-bold tracking-wider text-slate-500 uppercase">${escapeHtml(cat.name)}</div>
          </div>
          <div class="space-y-1.5">
            ${subcategories.length ? subcategories.map(sub => {
              const isActiveSub = isActiveCat && active?.subId === sub.id;
              return `
                <button
                  type="button"
                  data-nav="${escapeHtml(cat.id)}::${escapeHtml(sub.id)}"

  async function renderTopic(catId, subId, topicId) {
    const cat = findCategory(catId);
    const sub = findSub(catId, subId);

    breadcrumbEl.textContent = `${cat.name} - ${sub.name} - ${t.title}`;
    renderSidebar({ catId, subId });

    const mediaHtml = (() => {
      const m = t.media;
      if (!m || !m.type) return "";

      const caption = m.caption
        ? `<div class="mt-2 text-sm text-slate-600">${escapeHtml(m.caption)}</div>`
        : "";

      // IDB
      if (m.source === "idb" && m.key) {
        if (m.type === "image") {
          return `
            <div class="mt-6">
              <div class="text-sm font-semibold text-slate-900">Afbeelding</div>
              <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">

                     alt="" class="w-full max-h-[420px] object-contain rounded-xl bg-slate-50" />
                ${caption}
              </div>
            </div>
          `;
        }
        if (m.type === "video") {
          return `
            <div class="mt-6">
              <div class="text-sm font-semibold text-slate-900">Video uitleg</div>
              <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
                <video data-idb-media="${escapeHtml(m.key)}" data-idb-type="video"
                       controls class="w-full rounded-xl bg-black"></video>
                ${caption}
              </div>
            </div>
          `;
        }
        if (m.type === "audio") {
          return `
            <div class="mt-6">
              <div class="text-sm font-semibold text-slate-900">Audio uitleg</div>
              <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
                <audio data-idb-media="${escapeHtml(m.key)}" data-idb-type="audio"
                       controls class="w-full rounded-xl bg-white"></audio>
                ${caption}
              </div>
            </div>
          `;
        }
      }

      // URL
      if (m.source === "url" && m.value) {
        if (m.type === "image") {
          return `
            <div class="mt-6">
              <div class="text-sm font-semibold text-slate-900">Afbeelding</div>
              <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
                <img src="${escapeHtml(m.value)}" alt="" class="w-full max-h-[420px] object-contain rounded-xl bg-slate-50" />
                ${caption}
              </div>
            </div>
          `;
        }

        if (m.type === "video") {
          const yt = getYouTubeId(m.value);
          if (yt) {
            return `
              <div class="mt-6">
                <div class="text-sm font-semibold text-slate-900">Video</div>
                <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
                  <div class="aspect-video w-full overflow-hidden rounded-xl bg-black">
                    <iframe class="w-full h-full"
                      src="https://www.youtube.com/embed/${escapeHtml(yt)}"
                      title="YouTube video" frameborder="0"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowfullscreen></iframe>
                  </div>
                  ${caption}
                </div>
              </div>
            `;
          }

          return `
            <div class="mt-6">
              <div class="text-sm font-semibold text-slate-900">Video</div>
              <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
                <video controls class="w-full rounded-xl bg-black" src="${escapeHtml(m.value)}"></video>
                ${caption}
              </div>
            </div>
          `;
        }

        if (m.type === "audio") {
          return `
            <div class="mt-6">
              <div class="text-sm font-semibold text-slate-900">Audio</div>
              <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
                <audio controls class="w-full rounded-xl bg-white" src="${escapeHtml(m.value)}"></audio>
                ${caption}
              </div>
            </div>
          `;
        }
      }

      return "";
    })();

    const podcastHtml = (() => {
      const p = t.podcast;
      if (!p || (!p.value && !p.key)) return "";

      const caption = p.caption
        ? `<div class="mt-2 text-sm text-slate-600">${escapeHtml(p.caption)}</div>`
        : "";

      if (p.source === "idb" && p.key) {
        return `
          <div class="mt-6">
            <div class="text-sm font-semibold text-slate-900">Podcast uitleg</div>
            <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
              <audio data-idb-media="${escapeHtml(p.key)}" data-idb-type="audio"
                     controls class="w-full rounded-xl bg-white"></audio>
              ${caption}
            </div>
          </div>

      }

      if (p.source === "url" && p.value) {
        return `
          <div class="mt-6">
            <div class="text-sm font-semibold text-slate-900">Podcast uitleg</div>
            <div class="mt-2 rounded-2xl border border-slate-200 bg-white p-3">
              <audio controls class="w-full rounded-xl bg-white" src="${escapeHtml(p.value)}"></audio>
              ${caption}
            </div>
          </div>
        `;
      }

      return "";
    })();

    viewEl.innerHTML = `
      <section class="rounded-3xl border border-slate-200/80 bg-white/90 backdrop-blur p-6 shadow-soft">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <button
            class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-700 hover:border-brand-200 hover:bg-brand-50/60"
            type="button"
            data-back="1"
          >
            &larr; Terug naar oplossingen

          <button

        <h1 class="kb-display mt-5 text-3xl font-semibold text-slate-900">${escapeHtml(t.title)}</h1>
        <p class="mt-3 text-slate-700 leading-relaxed">${escapeHtml(t.body || "")}</p>

        ${t.tip ? `

    viewEl.querySelector("[data-back]").addEventListener("click", () => go(`#/` + catId + `/` + subId));
    viewEl.querySelector("[data-contact]").addEventListener("click", () => go("#/feedback"));

  async function renderAudioPage() {
    breadcrumbEl.textContent = "Audioversies / Podcast Uitleg";
    renderSidebar(null);

    const items = [];
    const linkedAudioKeys = new Set();
    for (const cat of DATA.categories) {
      for (const sub of (cat.subcategories || [])) {
        for (const topic of (sub.topics || [])) {
          const media = topic.media;
          const podcast = topic.podcast;
          const hasPodcast = !!(podcast && (podcast.value || podcast.key));
          const hasPlayableMedia = !!(media && (media.type === "video" || media.type === "audio") && (media.value || media.key));
          if (!hasPlayableMedia && !hasPodcast) continue;

          const source = (podcast && (podcast.value || podcast.key))
            ? { ...podcast, type: "audio", kind: "podcast" }
            : (media && (media.value || media.key) ? { ...media, kind: "media" } : null);
          if (source?.source === "idb" && source?.type === "audio" && source?.key) {
            linkedAudioKeys.add(String(source.key));
          }

          items.push({ cat, sub, topic, media, podcast });
        }
      }
    }

    let loosePodcasts = [];
    try {
      const allMedia = await idbList();
      loosePodcasts = allMedia
        .filter(({ record }) => record?.type === "audio")
        .filter(({ key }) => !linkedAudioKeys.has(String(key)))
        .sort((a, b) => {
          const da = a.record?.createdAt ? Date.parse(a.record.createdAt) : 0;
          const db = b.record?.createdAt ? Date.parse(b.record.createdAt) : 0;
          return db - da;
        });
    } catch {}

    const hasAnyAudio = items.length > 0 || loosePodcasts.length > 0;

    viewEl.innerHTML = `
      <section class="rounded-3xl border border-slate-200/80 bg-white/90 backdrop-blur p-6 shadow-soft">
        <div class="inline-flex items-center rounded-full border border-brand-100 bg-brand-50 px-3 py-1 text-xs font-semibold text-brand-700">
          Luisterversies
        </div>
        <h1 class="kb-display mt-3 text-3xl font-semibold text-slate-900">Audioversies / Podcast Uitleg</h1>
        <p class="mt-3 text-slate-700 max-w-2xl">
          Hieronder vind je gekoppelde audioversies per oplossing en losse podcasts die in admin zijn geupload.
        </p>

        ${items.length ? `
          <div class="mt-6 text-xs font-semibold uppercase tracking-wider text-slate-500">Gekoppeld aan oplossingen</div>
          <div class="mt-6 grid gap-4 sm:grid-cols-2">
            ${items.map(({ cat, sub, topic, media, podcast }) => {
              let audioBlock = `
                <div class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-600">
                  Open de oplossing om de uitleg te beluisteren.
                </div>
              `;

              const source = (podcast && (podcast.value || podcast.key))
                ? { ...podcast, type: "audio", kind: "podcast" }
                : (media && (media.value || media.key) ? { ...media, kind: "media" } : null);

              if (source?.source === "url" && source.value) {
                if (source.type === "audio") {
                  audioBlock = `
                    <audio controls preload="none" controlslist="nodownload noplaybackrate noremoteplayback" disableremoteplayback
                      oncontextmenu="return false;" class="w-full rounded-lg border border-slate-200 bg-white" src="${escapeHtml(source.value)}"></audio>
                  `;
                } else {
                  const yt = getYouTubeId(source.value);
                  if (!yt) {
                    audioBlock = `
                      <audio controls preload="none" controlslist="nodownload noplaybackrate noremoteplayback" disableremoteplayback
                        oncontextmenu="return false;" class="w-full rounded-lg border border-slate-200 bg-white" src="${escapeHtml(source.value)}"></audio>
                    `;
                  }
                }
              } else if (source?.source === "idb" && source.key) {
                audioBlock = `
                  <audio controls preload="none" controlslist="nodownload noplaybackrate noremoteplayback" disableremoteplayback
                    oncontextmenu="return false;" class="w-full rounded-lg border border-slate-200 bg-white"
                    data-idb-media="${escapeHtml(source.key)}" data-idb-type="audio"></audio>
                `;
              }

              return `
                <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
                  <div class="text-[11px] font-semibold uppercase tracking-wider text-slate-500">${escapeHtml(cat.name)} - ${escapeHtml(sub.name)}</div>
                  <div class="mt-1 kb-display text-lg font-semibold text-slate-900">${escapeHtml(topic.title)}</div>
                  <div class="mt-2 text-sm text-slate-600">${escapeHtml(topic.summary || "Geen samenvatting beschikbaar.")}</div>

                    <button
                      type="button"
                      data-open-topic="${escapeHtml(cat.id)}::${escapeHtml(sub.id)}::${escapeHtml(topic.id)}"
                      class="inline-flex items-center gap-1 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-700 hover:border-brand-200 hover:bg-brand-50/60"
                    >
                      Open oplossing &rarr;
                    </button>
                  </div>
                </article>
              `;
            }).join("")}
          </div>
        ` : ``}

        ${loosePodcasts.length ? `
          <div class="mt-8 text-xs font-semibold uppercase tracking-wider text-slate-500">Losse podcasts uit admin</div>
          <div class="mt-3 grid gap-4 sm:grid-cols-2">
            ${loosePodcasts.map(({ key, record }) => `
              <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
                <div class="text-[11px] font-semibold uppercase tracking-wider text-slate-500">Podcast upload</div>
                <div class="mt-1 kb-display text-lg font-semibold text-slate-900">${escapeHtml(record?.name || `podcast-${key}`)}</div>
                <div class="mt-2 text-xs text-slate-500">
                  ${record?.createdAt ? escapeHtml(new Date(record.createdAt).toLocaleString()) : "Onbekende datum"}

        ` : ``}

        <div class="mt-6">
          <button
            type="button"
            data-home="1"
            class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
          >
            Terug naar start

        </div>
      </section>
    `;

    viewEl.querySelectorAll("[data-open-topic]").forEach(btn => {
      btn.addEventListener("click", () => {
        const [catId, subId, topicId] = btn.getAttribute("data-open-topic").split("::");
        go(`#/` + catId + `/` + subId + `/` + topicId);
        closeSidebarMobile();
      });
    });

    const homeBtn = viewEl.querySelector("[data-home]");
    if (homeBtn) homeBtn.addEventListener("click", () => go("#/"));

    viewEl.querySelectorAll("audio").forEach(el => {
      el.controlsList = "nodownload noplaybackrate noremoteplayback";
      el.setAttribute("disableremoteplayback", "");
      el.addEventListener("contextmenu", (e) => e.preventDefault());
    });

    revokeActiveObjectUrls();
    await hydrateIdbMedia();

    viewEl.innerHTML = `
      <section class="rounded-3xl border border-slate-200/80 bg-white/90 backdrop-blur p-6 shadow-soft">
        <div class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">
          Feedback
        </div>
        <h1 class="kb-display mt-3 text-3xl font-semibold text-slate-900">Wat kunnen we verbeteren?</h1>
        <p class="mt-3 text-slate-700 max-w-2xl">
          Kies de reden die het beste past. Zo verbeteren we de kennisbank gericht.
        </p>

        <div class="mt-6 grid gap-3 sm:grid-cols-2">
          ${ISSUE_REASONS.map(reason => {
            return `
              <button
                type="button"
                data-feedback-reason="${escapeHtml(reason.id)}"
                data-feedback-label="${escapeHtml(reason.label)}"
                class="text-left rounded-xl border border-slate-200 bg-white px-4 py-3 hover:border-slate-300 hover:bg-slate-50"
              >
                <div class="font-semibold text-slate-900">${escapeHtml(reason.label)}</div>
              </button>
            `;
          }).join("")}
        </div>

        <div class="mt-4 rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700" data-feedback-result>
          ${lastLabel ? `Laatste feedback: <strong>${lastLabel}</strong> (${escapeHtml(lastAt)})` : "Nog geen feedback gekozen."}
        </div>

        <div class="mt-6 flex flex-wrap gap-2">
          <button
            type="button"
            data-home="1"
            class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
          >
            Terug naar start
          </button>
        </div>
      </section>
    `;

    viewEl.querySelectorAll("[data-feedback-reason]").forEach(btn => {
      btn.addEventListener("click", () => {
        const reasonId = btn.getAttribute("data-feedback-reason");
        const label = btn.getAttribute("data-feedback-label");
        if (!reasonId || !label) return;
        submitIssueFeedback(reasonId, label);
        showToast("Feedback opgeslagen. Bedankt.");
        renderFeedback();
      });
    });

    const homeBtn = viewEl.querySelector("[data-home]");
    if (homeBtn) homeBtn.addEventListener("click", () => go("#/"));
  }

  async function render() {
    DATA = loadData();
    setLiveMeta();

    const r = parseRoute();
    if (r.view === "home") return renderHome();
    if (r.view === "tiles") return renderTiles(r.catId, r.subId);
    if (r.view === "topic") return renderTopic(r.catId, r.subId, r.topicId);
    if (r.view === "audio") return renderAudioPage();
    if (r.view === "feedback") return renderFeedback();
    renderHome();
  }

  // Live update listeners
  let lastDataSnapshot = localStorage.getItem(STORAGE_KEY) || "";

  window.addEventListener("storage", (e) => {
    if (e.key === STORAGE_KEY) {
      lastDataSnapshot = e.newValue || "";
      showToast("Content bijgewerkt.");
      render();
    }
  });

  if (bc) {
    bc.addEventListener("message", (msg) => {
      if (msg?.data?.type === "updated") {
        lastDataSnapshot = localStorage.getItem(STORAGE_KEY) || "";
        showToast("Content bijgewerkt.");
        render();
      }
    });
  }

  // Fallback voor kiosk-situaties waarin storage/broadcast events niet altijd doorkomen.
  setInterval(() => {
    const snap = localStorage.getItem(STORAGE_KEY) || "";
    if (snap !== lastDataSnapshot) {
      lastDataSnapshot = snap;
      render();
    }
  }, 2000);

  // Mobile sidebar controls
  function openSidebarMobile() {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
    document.body.classList.add("overflow-hidden");
  }
  function closeSidebarMobile() {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
    document.body.classList.remove("overflow-hidden");
  }

  function randomizeIdleVelocity() {
    const minComponent = 1.1;
    let nextX = (Math.random() < 0.5 ? -1 : 1) * (IDLE_BASE_SPEED + Math.random() * 0.8);
    let nextY = (Math.random() < 0.5 ? -1 : 1) * (IDLE_BASE_SPEED + Math.random() * 0.8);
    if (Math.abs(nextX) < minComponent) nextX = Math.sign(nextX || 1) * minComponent;
    if (Math.abs(nextY) < minComponent) nextY = Math.sign(nextY || 1) * minComponent;
    idleVelX = nextX;
    idleVelY = nextY;
  }

  function getIdleBounds() {
    if (!idleScreensaverEl || !idleScreensaverLogoEl) return null;
    const screen = idleScreensaverEl.getBoundingClientRect();
    const logo = idleScreensaverLogoEl.getBoundingClientRect();
    return {
      maxX: Math.max(0, screen.width - logo.width),
      maxY: Math.max(0, screen.height - logo.height)
    };
  }

  function renderIdlePosition() {
    if (!idleScreensaverLogoEl) return;
    idleScreensaverLogoEl.style.transform = `translate3d(${idlePosX}px, ${idlePosY}px, 0)`;
  }

  function clampIdlePosition() {
    const bounds = getIdleBounds();
    if (!bounds) return;
    idlePosX = Math.max(0, Math.min(bounds.maxX, idlePosX));
    idlePosY = Math.max(0, Math.min(bounds.maxY, idlePosY));
    renderIdlePosition();
  }

  function stopIdleAnimation() {
    if (idleAnimFrame !== null) {
      cancelAnimationFrame(idleAnimFrame);
      idleAnimFrame = null;
    }
    idleAnimPrevTs = null;
  }

  function flashIdleBounce() {
    if (!idleScreensaverLogoEl) return;
    idleScreensaverLogoEl.classList.remove("is-bounce-flash");
    void idleScreensaverLogoEl.offsetWidth;
    idleScreensaverLogoEl.classList.add("is-bounce-flash");
  }

  function markIdleCornerHit() {
    if (!idleScreensaverMessageEl) return;
    idleScreensaverMessageEl.textContent = "Hoek geraakt!";
    idleScreensaverMessageEl.classList.add("is-corner-hit");
    clearTimeout(idleCornerFlashTimer);
    idleCornerFlashTimer = setTimeout(() => {
      if (!idleScreensaverMessageEl) return;
      idleScreensaverMessageEl.classList.remove("is-corner-hit");
      idleScreensaverMessageEl.textContent = "Beweeg de muis om de site te openen";
    }, 1200);
  }

  function animateIdleBouncer(timestamp) {
    if (!idleScreenVisible) {
      stopIdleAnimation();
      return;
    }

    if (idleAnimPrevTs === null) idleAnimPrevTs = timestamp;
    const deltaMs = Math.min(42, timestamp - idleAnimPrevTs);
    idleAnimPrevTs = timestamp;
    const frameFactor = deltaMs / 16.6667;

    const bounds = getIdleBounds();
    if (!bounds) {
      idleAnimFrame = requestAnimationFrame(animateIdleBouncer);
      return;
    }

    let nextX = idlePosX + (idleVelX * frameFactor);
    let nextY = idlePosY + (idleVelY * frameFactor);
    let hitX = false;
    let hitY = false;

    if (nextX <= 0) {
      nextX = 0;
      idleVelX = Math.abs(idleVelX);
      hitX = true;
    } else if (nextX >= bounds.maxX) {
      nextX = bounds.maxX;
      idleVelX = -Math.abs(idleVelX);
      hitX = true;
    }

    if (nextY <= 0) {
      nextY = 0;
      idleVelY = Math.abs(idleVelY);
      hitY = true;
    } else if (nextY >= bounds.maxY) {
      nextY = bounds.maxY;
      idleVelY = -Math.abs(idleVelY);
      hitY = true;
    }

    idlePosX = nextX;
    idlePosY = nextY;
    renderIdlePosition();

    if (hitX || hitY) flashIdleBounce();
    if (hitX && hitY) markIdleCornerHit();

    idleAnimFrame = requestAnimationFrame(animateIdleBouncer);
  }

  function startIdleAnimation() {
    if (!idleScreensaverEl || !idleScreensaverLogoEl) return;
    if (!idleBouncerInitialized) {
      const bounds = getIdleBounds();
      if (bounds) {
        idlePosX = bounds.maxX / 2;
        idlePosY = bounds.maxY / 2;
      }
      randomizeIdleVelocity();
      idleBouncerInitialized = true;
    }
    clampIdlePosition();
    stopIdleAnimation();
    idleAnimFrame = requestAnimationFrame(animateIdleBouncer);
  }

  function showIdleScreensaver() {
    if (!idleScreensaverEl || idleScreenVisible) return;
    closeSidebarMobile();
    idleScreenVisible = true;
    idleScreensaverEl.classList.add("is-active");
    idleScreensaverEl.setAttribute("aria-hidden", "false");
    if (idleScreensaverMessageEl) {
      idleScreensaverMessageEl.textContent = "Beweeg de muis om de site te openen";
      idleScreensaverMessageEl.classList.remove("is-corner-hit");
    }
    startIdleAnimation();
  }

  function hideIdleScreensaver() {
    if (!idleScreensaverEl || !idleScreenVisible) return;
    idleScreenVisible = false;
    idleScreensaverEl.classList.remove("is-active");
    idleScreensaverEl.setAttribute("aria-hidden", "true");
    clearTimeout(idleCornerFlashTimer);
    stopIdleAnimation();
  }

  function resetIdleScreensaverTimer() {
    clearTimeout(idleTimer);
    idleTimer = null;
    if (!idleScreensaverEl || document.hidden) return;
    idleTimer = setTimeout(() => {
      if (document.hidden) return;
      showIdleScreensaver();
    }, IDLE_TIMEOUT_MS);
  }

  function handleIdleActivity() {
    if (idleScreenVisible) hideIdleScreensaver();
    resetIdleScreensaverTimer();
  }

  function setupIdleScreensaver() {
    if (!idleScreensaverEl || !idleScreensaverLogoEl) return;

    const passiveEvents = ["pointermove", "pointerdown", "touchstart", "wheel", "scroll"];
    passiveEvents.forEach((eventName) => {
      const target = eventName === "scroll" ? window : document;
      target.addEventListener(eventName, handleIdleActivity, { passive: true });
    });
    document.addEventListener("keydown", handleIdleActivity);

    idleScreensaverEl.addEventListener("click", handleIdleActivity);
    idleScreensaverEl.addEventListener("touchstart", handleIdleActivity, { passive: true });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        hideIdleScreensaver();
        clearTimeout(idleTimer);
        idleTimer = null;
        return;
      }
      resetIdleScreensaverTimer();
    });

    window.addEventListener("resize", clampIdlePosition, { passive: true });
    randomizeIdleVelocity();
    clampIdlePosition();
    resetIdleScreensaverTimer();
  }

  openSidebarBtn.addEventListener("click", openSidebarMobile);
  closeSidebarBtn.addEventListener("click", closeSidebarMobile);
  overlay.addEventListener("click", closeSidebarMobile);
  if (navSearchEl) {
    navSearchEl.addEventListener("input", () => {
      renderSidebar(getActiveSidebarState());
    });
  }

  document.getElementById("contactBtn").addEventListener("click", () => {
    go("#/feedback");
    closeSidebarMobile();
  });

  window.addEventListener("hashchange", async () => {
    revokeActiveObjectUrls();
    await render();
  });

  // Init
  async function initApp() {
    if (!location.hash) location.hash = "#/";
    await syncDataFromRepoIfNeeded();
    DATA = loadData();
    lastDataSnapshot = localStorage.getItem(STORAGE_KEY) || "";
    await render();
    setupIdleScreensaver();
  }

  initApp();
</script>
</body>
</html>
