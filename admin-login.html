<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Kennisbank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "ui-sans-serif", "sans-serif"],
            display: ["Sora", "ui-sans-serif", "sans-serif"]
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: "Manrope", ui-sans-serif, sans-serif;
      background: radial-gradient(circle at 20% 10%, #fee2e2 0%, rgba(254, 226, 226, 0) 45%),
                  radial-gradient(circle at 85% 15%, #dbeafe 0%, rgba(219, 234, 254, 0) 45%),
                  linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    h1, h2, h3, .kb-display { font-family: "Sora", ui-sans-serif, sans-serif; }
  </style>
</head>

<body class="text-slate-900 antialiased min-h-screen">
  <main class="min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-md rounded-3xl border border-slate-200/80 bg-white/90 p-6 shadow-2xl shadow-slate-900/10 backdrop-blur">
      <div class="flex items-center gap-3">
        <div class="h-12 w-12 rounded-2xl bg-white border border-slate-200 overflow-hidden shadow-sm">
          <img src="./ROCM.jpeg" alt="Logo" class="h-full w-full object-cover">
        </div>
        <div>
          <div class="kb-display text-lg font-semibold">Admin toegang</div>
          <div class="text-xs text-slate-500">ROC Mondriaan ICT Portaal</div>
        </div>
      </div>

      <p class="mt-5 text-sm text-slate-600">Voer de pincode in om door te gaan naar het admin panel.</p>

      <form id="pinForm" class="mt-4 space-y-3" autocomplete="off">
        <div>
          <label for="pinInput" class="text-xs font-semibold text-slate-600">Pincode</label>
          <input
            id="pinInput"
            type="password"
            inputmode="numeric"
            maxlength="12"
            class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"
            placeholder="Voer pincode in"
            required
          />
        </div>

        <p id="errorText" class="hidden rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
          Onjuiste pincode. Probeer opnieuw.
        </p>

        <button
          type="submit"
          class="w-full rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-300"
        >
          Doorgaan
        </button>
      </form>

      <a href="./index.html" class="mt-4 inline-flex text-sm font-semibold text-slate-700 hover:text-slate-900">
        Terug naar portaal
      </a>
    </section>
  </main>

  <script>
    (() => {
      const ADMIN_AUTH_KEY = "kb_admin_auth_v1";
      const ADMIN_AUTH_VALUE = "verified";
      const ADMIN_PIN_HASH = "13b3f39cb74686a176eb0f364ffe4e5e38c9bfa5bb9a8bd1624135ce306ef3d0";

      const form = document.getElementById("pinForm");
      const input = document.getElementById("pinInput");
      const errorText = document.getElementById("errorText");

      function resolveNextPath() {
        const params = new URLSearchParams(window.location.search);
        const rawNext = (params.get("next") || "admin.html").trim();
        if (!rawNext || rawNext.includes("..")) return "./admin.html";
        if (/^https?:\/\//i.test(rawNext) || rawNext.startsWith("//")) return "./admin.html";
        const cleaned = rawNext.replace(/^\/+/, "");
        if (!cleaned.toLowerCase().endsWith(".html")) return "./admin.html";
        return cleaned.startsWith("./") ? cleaned : `./${cleaned}`;
      }

      const nextPath = resolveNextPath();
      if (sessionStorage.getItem(ADMIN_AUTH_KEY) === ADMIN_AUTH_VALUE) {
        window.location.replace(nextPath);
        return;
      }

      async function sha256Hex(value) {
        if (!window.crypto?.subtle) return "";
        const bytes = new TextEncoder().encode(String(value || ""));
        const digest = await window.crypto.subtle.digest("SHA-256", bytes);
        return [...new Uint8Array(digest)]
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const entered = (input.value || "").trim();
        const enteredHash = await sha256Hex(entered);
        if (!enteredHash || enteredHash !== ADMIN_PIN_HASH) {
          errorText.classList.remove("hidden");
          input.value = "";
          input.focus();
          return;
        }
        sessionStorage.setItem(ADMIN_AUTH_KEY, ADMIN_AUTH_VALUE);
        window.location.replace(nextPath);
      });
    })();
  </script>
</body>
</html>
